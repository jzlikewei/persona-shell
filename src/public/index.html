<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persona Console</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --base: #1e1e2e;
      --mantle: #181825;
      --crust: #11111b;
      --surface0: #313244;
      --surface1: #45475a;
      --surface2: #585b70;
      --overlay0: #6c7086;
      --overlay1: #7f849c;
      --text: #cdd6f4;
      --subtext0: #a6adc8;
      --subtext1: #bac2de;
      --green: #a6e3a1;
      --red: #f38ba8;
      --yellow: #f9e2af;
      --blue: #89b4fa;
      --teal: #94e2d5;
      --mauve: #cba6f7;
      --peach: #fab387;
      --lavender: #b4befe;
      --rosewater: #f5e0dc;

      --font-mono: 'SF Mono', 'Menlo', 'Consolas', 'JetBrains Mono', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius: 10px;
      --radius-sm: 6px;
      --gap: 12px;
      --sidebar-w: 280px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--base);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--mantle);
      border-bottom: 1px solid var(--surface0);
      flex-shrink: 0;
      font-size: 13px;
    }

    #header .logo {
      font-weight: 700;
      font-size: 15px;
      color: var(--lavender);
      letter-spacing: 0.5px;
    }

    .hi { display: flex; align-items: center; gap: 5px; }
    .hi-label { color: var(--overlay1); font-size: 12px; }
    .hi-value { font-family: var(--font-mono); font-size: 12px; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: var(--green);  box-shadow: 0 0 6px rgba(166,227,161,.5); }
    .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(249,226,175,.4); }
    .dot.red    { background: var(--red);    box-shadow: 0 0 6px rgba(243,139,168,.4); }
    .dot.off    { background: var(--overlay0); }

    .hspacer { flex: 1; }

    .queue-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(249,226,175,.12);
      color: var(--yellow);
    }

    #body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--mantle);
      border-right: 1px solid var(--surface0);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sb-section {
      padding: 10px 12px;
      border-bottom: 1px solid var(--surface0);
    }

    .sb-section:last-child { border-bottom: none; }

    .sb-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--overlay0);
      margin-bottom: 8px;
      font-weight: 700;
    }

    /* Status cards in sidebar */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 3px 0;
    }
    .status-label { color: var(--overlay1); }
    .status-value { font-family: var(--font-mono); font-size: 12px; }

    /* Activity indicator */
    .act-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .act-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .act-dot.idle       { background: var(--overlay0); }
    .act-dot.processing { background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
    .act-dot.flushing   { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
    .act-dot.restarting { background: var(--peach); animation: pulse 1.5s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.75); }
    }

    .act-text {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
    }

    .act-preview-text {
      font-size: 11px;
      color: var(--subtext0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .act-elapsed-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--overlay1);
      margin-top: 1px;
    }

    /* Context bar */
    .ctx-bar-wrap {
      height: 6px;
      background: var(--surface1);
      border-radius: 3px;
      overflow: hidden;
      margin: 6px 0 4px;
    }
    .ctx-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .6s ease, background .4s ease;
      min-width: 0;
    }
    .ctx-info {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--subtext0);
    }
    .ctx-pct { font-weight: 700; }

    /* Session / Task lists */
    .sb-scroll {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .sb-scroll::-webkit-scrollbar { width: 4px; }
    .sb-scroll::-webkit-scrollbar-track { background: transparent; }
    .sb-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      transition: background .15s;
    }
    .list-item:hover { background: var(--surface0); }
    .list-item.active { background: var(--surface1); }

    .list-item .item-icon {
      font-size: 11px;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }
    .list-item .item-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--subtext1);
    }
    .list-item .item-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--overlay0);
      flex-shrink: 0;
    }

    /* Task badge (small) */
    .badge {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .3px;
      flex-shrink: 0;
    }
    .badge.running, .badge.dispatched { background: rgba(166,227,161,.15); color: var(--green); }
    .badge.completed { background: rgba(137,180,250,.15); color: var(--blue); }
    .badge.failed    { background: rgba(243,139,168,.15); color: var(--red); }
    .badge.cancelled { background: rgba(166,173,200,.15); color: var(--subtext0); }
    .badge.pending   { background: rgba(249,226,175,.15); color: var(--yellow); }

    .running-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* Actions */
    .action-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 5px 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      line-height: 1;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-flush   { background: var(--blue);   color: var(--crust); }
    .btn-esc     { background: var(--yellow); color: var(--crust); }
    .btn-restart { background: var(--red);    color: var(--crust); }

    .send-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .send-row input {
      flex: 1;
      padding: 6px 10px;
      background: var(--surface0);
      border: 1px solid var(--surface1);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .send-row input:focus { border-color: var(--blue); }
    .send-row input::placeholder { color: var(--overlay0); }
    .send-row .btn-send {
      padding: 6px 10px;
      background: var(--mauve);
      color: var(--crust);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
    }
    .send-row .btn-send:hover { opacity: .85; }

    /* ── Main Content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    #detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--surface0);
      border-bottom: 1px solid var(--surface1);
      flex-shrink: 0;
      min-height: 38px;
    }
    #detail-header .dh-title {
      font-weight: 600;
      font-size: 13px;
    }
    #detail-header .dh-sub {
      font-size: 12px;
      color: var(--overlay1);
      font-family: var(--font-mono);
    }

    #detail-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      min-height: 0;
    }
    #detail-content::-webkit-scrollbar { width: 6px; }
    #detail-content::-webkit-scrollbar-track { background: transparent; }
    #detail-content::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    /* ── Dashboard (default view) ── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .dash-card {
      background: var(--surface0);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .dash-card-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--overlay1);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .stat-big {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--overlay1);
      margin-top: 2px;
    }

    /* Queue items */
    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--surface0);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      font-size: 13px;
    }
    .queue-item.cancelled { opacity: .5; text-decoration: line-through; }
    .queue-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--subtext1);
    }
    .queue-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--overlay0);
      flex-shrink: 0;
    }

    /* Recent messages (dashboard) */
    .dmsg-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    .dmsg-row + .dmsg-row { margin-top: 1px; }
    .dmsg-row.in { background: rgba(137,180,250,.04); }
    .dmsg-dir {
      font-family: var(--font-mono);
      width: 16px;
      text-align: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .dmsg-dir.in  { color: var(--blue); }
    .dmsg-dir.out { color: var(--green); }
    .dmsg-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--subtext1);
    }
    .dmsg-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--overlay0);
      flex-shrink: 0;
    }

    /* Errors */
    .err-section {
      background: rgba(243,139,168,.06);
      border: 1px solid rgba(243,139,168,.15);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-top: 12px;
    }
    .err-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 2px 0;
    }
    .err-icon { color: var(--yellow); flex-shrink: 0; font-size: 11px; }
    .err-text { color: var(--red); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .err-time { font-family: var(--font-mono); font-size: 10px; color: var(--overlay0); flex-shrink: 0; }

    /* ── Chat View (session messages) ── */
    #chat-container {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }
    #chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      min-height: 0;
    }
    #chat-scroll::-webkit-scrollbar { width: 5px; }
    #chat-scroll::-webkit-scrollbar-track { background: transparent; }
    #chat-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    .chat-msg { margin-bottom: 12px; }
    .chat-msg-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .chat-msg-role {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .chat-msg-role.user { color: var(--blue); }
    .chat-msg-role.bot { color: var(--green); }
    .chat-msg-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--overlay0);
    }
    .chat-msg-body {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.6;
    }
    .chat-msg.in .chat-msg-body {
      background: rgba(137,180,250,.06);
      border-left: 3px solid var(--blue);
      color: var(--text);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .chat-msg.out .chat-msg-body {
      background: var(--surface0);
    }
    .chat-msg.out .chat-msg-body .md-content h1,
    .chat-msg.out .chat-msg-body .md-content h2,
    .chat-msg.out .chat-msg-body .md-content h3 { color: var(--text); margin: 10px 0 4px; }
    .chat-msg.out .chat-msg-body .md-content p { margin: 4px 0; }
    .chat-msg.out .chat-msg-body .md-content code {
      background: var(--surface1);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .chat-msg.out .chat-msg-body .md-content pre {
      background: var(--crust);
      padding: 10px 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .chat-msg.out .chat-msg-body .md-content pre code { background: none; padding: 0; }
    .chat-msg.out .chat-msg-body .md-content a { color: var(--blue); }
    .chat-msg.out .chat-msg-body .md-content ul,
    .chat-msg.out .chat-msg-body .md-content ol { padding-left: 20px; margin: 4px 0; }

    .chat-processing {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      color: var(--overlay1);
      font-size: 12px;
    }

    #chat-input-bar {
      display: none;
      flex-shrink: 0;
      padding: 6px 8px;
      gap: 6px;
      border-top: 1px solid var(--surface1);
      background: var(--mantle);
    }
    #chat-input-bar.visible { display: flex; }
    #chat-input-bar input {
      flex: 1;
      padding: 7px 12px;
      background: var(--surface0);
      border: 1px solid var(--surface1);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    #chat-input-bar input:focus { border-color: var(--blue); }
    #chat-input-bar input::placeholder { color: var(--overlay0); }
    #chat-input-bar button {
      padding: 7px 14px;
      background: var(--mauve);
      color: var(--crust);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      transition: opacity .15s;
    }
    #chat-input-bar button:hover { opacity: .85; }
    /* When chat is visible, hide the scrollable detail-content */
    #main.chat-active #detail-content { display: none; }
    #main.chat-active #chat-container { display: flex; }

    /* ── Task Detail View ── */
    .task-detail { }
    .td-meta {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .td-field {
      background: var(--surface0);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .td-field-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--overlay0);
      margin-bottom: 4px;
    }
    .td-field-value {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .td-section {
      margin-top: 16px;
    }
    .td-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--overlay1);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .td-prompt {
      background: var(--surface0);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--subtext1);
      max-height: 200px;
      overflow-y: auto;
    }
    .td-output {
      background: var(--surface0);
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.6;
    }
    .td-output .md-content h1, .td-output .md-content h2, .td-output .md-content h3 { color: var(--text); margin: 10px 0 4px; }
    .td-output .md-content p { margin: 4px 0; }
    .td-output .md-content code {
      background: var(--surface1);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .td-output .md-content pre {
      background: var(--crust);
      padding: 10px 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .td-output .md-content pre code { background: none; padding: 0; }
    .td-output .md-content a { color: var(--blue); }
    .td-error {
      background: rgba(243,139,168,.08);
      border: 1px solid rgba(243,139,168,.2);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* ── Task Detail Split View ── */
    #detail-content.task-split-mode {
      overflow: hidden;
      padding: 0;
    }
    .task-detail-split {
      display: flex;
      height: 100%;
    }
    .td-log-panel {
      flex: 6;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--surface0);
    }
    .td-result-panel {
      flex: 4;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .td-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--surface0);
      flex-shrink: 0;
    }
    .td-log-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
      min-height: 0;
    }
    .td-log-scroll::-webkit-scrollbar { width: 5px; }
    .td-log-scroll::-webkit-scrollbar-track { background: transparent; }
    .td-log-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
    .td-result-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      min-height: 0;
    }
    .td-result-scroll::-webkit-scrollbar { width: 5px; }
    .td-result-scroll::-webkit-scrollbar-track { background: transparent; }
    .td-result-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    /* Log entry types */
    .log-entry { margin-bottom: 2px; }
    .log-system {
      color: var(--overlay0);
      font-size: 11px;
      font-family: var(--font-mono);
      padding: 4px 0;
    }
    .log-text {
      color: var(--text);
      padding: 4px 0;
      line-height: 1.6;
      font-size: 13px;
    }
    .log-text p { margin: 4px 0; }
    .log-text code {
      background: var(--surface1);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .log-text pre {
      background: var(--crust);
      padding: 8px 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 4px 0;
    }
    .log-text pre code { background: none; padding: 0; }
    .log-text a { color: var(--blue); }
    .log-thinking {
      cursor: pointer;
      padding: 2px 0;
    }
    .log-thinking .think-label {
      color: var(--overlay0);
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .log-thinking .think-content {
      display: none;
      margin-top: 4px;
      padding: 6px 10px;
      background: var(--surface0);
      border-radius: var(--radius-sm);
      font-style: italic;
      color: var(--overlay1);
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 300px;
      overflow-y: auto;
      font-size: 12px;
    }
    .log-thinking.expanded .think-content { display: block; }
    .log-tool {
      background: var(--surface0);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      margin: 4px 0;
      cursor: pointer;
    }
    .log-tool .tool-header {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--mauve);
    }
    .log-tool .tool-detail {
      display: none;
      margin-top: 6px;
      padding: 6px 8px;
      background: var(--crust);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--subtext0);
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-tool.expanded .tool-detail { display: block; }
    .log-tool-result {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--overlay1);
      padding: 2px 10px;
      margin: 0 0 4px;
      max-height: 60px;
      overflow: hidden;
      cursor: pointer;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .log-tool-result.expanded { max-height: none; }
    .log-tool-result.error { color: var(--red); }
    .log-result {
      background: rgba(166,227,161,.08);
      border: 1px solid rgba(166,227,161,.15);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      margin: 8px 0;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--green);
    }
    .td-result-running {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 0;
      color: var(--overlay1);
      font-size: 13px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      transform: translateY(-12px);
      opacity: 0;
      transition: all .25s ease;
      z-index: 500;
      pointer-events: none;
      max-width: 320px;
      word-break: break-word;
    }
    #toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
    #toast.ok  { background: var(--green); color: var(--crust); }
    #toast.err { background: var(--red);   color: var(--crust); }

    /* ── Connecting Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(30,30,46,.92);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    #overlay.hidden { display: none; }

    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--surface2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-text { color: var(--subtext0); font-size: 13px; }

    /* ── Empty state ── */
    .empty { color: var(--overlay0); font-size: 12px; text-align: center; padding: 16px 0; }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      :root { --sidebar-w: 0px; }
      #sidebar { display: none; }
      .dash-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text">Connecting...</div>
</div>

<div id="app">

  <!-- Header -->
  <header id="header">
    <span class="logo">Persona Shell</span>
    <div class="hi">
      <div class="dot off" id="hb-dot"></div>
      <span class="hi-value" id="hb-status">--</span>
    </div>
    <div class="hi">
      <span class="hi-label">Messaging</span>
      <span class="hi-value" id="hb-messaging">--</span>
    </div>
    <div class="hi">
      <span class="hi-label">Director</span>
      <span class="hi-value" id="hb-director">--</span>
    </div>
    <div class="hi" id="hb-queue-wrap" style="display:none">
      <span class="queue-badge" id="hb-queue"></span>
    </div>
    <div class="hspacer"></div>
    <div class="hi">
      <span class="hi-label">Uptime</span>
      <span class="hi-value" id="hb-uptime">--</span>
    </div>
  </header>

  <div id="body">
    <!-- Sidebar -->
    <aside id="sidebar">

      <!-- Status -->
      <div class="sb-section">
        <div class="sb-title">Activity</div>
        <div class="act-row">
          <div class="act-dot idle" id="act-dot"></div>
          <span class="act-text" id="act-label">Idle</span>
        </div>
        <div class="act-preview-text" id="act-preview"></div>
        <div class="act-elapsed-text" id="act-elapsed"></div>
      </div>

      <div class="sb-section">
        <div class="sb-title">Context Window</div>
        <div class="ctx-bar-wrap">
          <div class="ctx-bar-fill" id="ctx-bar" style="width:0;background:var(--green)"></div>
        </div>
        <div class="ctx-info">
          <span id="ctx-tokens">-- / --</span>
          <span class="ctx-pct" id="ctx-pct" style="color:var(--green)">0%</span>
        </div>
        <div style="font-size:11px;color:var(--overlay0);margin-top:4px;font-family:var(--font-mono)" id="ctx-flush">Last flush: --</div>
      </div>

      <div class="sb-section">
        <div class="sb-title">Today</div>
        <div class="status-row">
          <span class="status-label">Messages</span>
          <span class="status-value" id="st-msgs">0</span>
        </div>
        <div class="status-row">
          <span class="status-label">Avg Response</span>
          <span class="status-value" id="st-avg">0s</span>
        </div>
        <div class="status-row">
          <span class="status-label">Cost</span>
          <span class="status-value" id="st-cost">$0</span>
        </div>
      </div>

      <!-- Sessions -->
      <div class="sb-section" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
        <div class="sb-title">Sessions</div>
        <div class="sb-scroll" id="session-list">
          <div class="empty">No sessions</div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="sb-section" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
        <div class="sb-title">Tasks <span id="task-counts" style="font-size:9px;color:var(--overlay1);text-transform:none;letter-spacing:0;font-weight:400"></span></div>
        <div class="sb-scroll" id="task-list">
          <div class="empty">No tasks</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="sb-section">
        <div class="sb-title">Actions</div>
        <div class="action-btns">
          <button class="btn btn-flush" onclick="doCmd('flush')">Flush</button>
          <button class="btn btn-esc" onclick="doCmd('esc')">Esc</button>
          <button class="btn btn-restart" onclick="doCmd('restart')">Restart</button>
        </div>
        <div class="send-row">
          <input type="text" id="send-input" placeholder="Send to Director..." onkeydown="if(event.key==='Enter'&&!event.isComposing)doSend()" />
          <button class="btn-send" onclick="doSend()">&#10132;</button>
        </div>
      </div>

    </aside>

    <!-- Main content area -->
    <div id="main">
      <div id="detail-header">
        <span class="dh-title" id="dh-title">Dashboard</span>
        <span class="dh-sub" id="dh-sub"></span>
      </div>
      <div id="detail-content">
        <!-- filled by JS -->
      </div>
      <div id="chat-container">
        <div id="chat-scroll"><div id="chat-messages"></div></div>
        <div id="chat-input-bar">
          <input type="text" id="chat-input" placeholder="Send message to Director..." onkeydown="if(event.key==='Enter'&&!event.isComposing)doChatSend()" />
          <button onclick="doChatSend()">Send</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
(function () {
  'use strict';

  // ── Helpers ──
  function fmtDur(ms) {
    if (ms == null || ms < 0) return '0s';
    var s = Math.floor(ms / 1000);
    if (s < 60) return s + 's';
    var m = Math.floor(s / 60);
    if (m < 60) return m + 'm ' + (s % 60) + 's';
    var h = Math.floor(m / 60);
    return h + 'h ' + (m % 60) + 'm';
  }

  function fmtAgo(ts) {
    if (!ts) return '--';
    var d = Date.now() - ts;
    if (d < 0) d = 0;
    if (d < 5000) return 'just now';
    if (d < 60000) return Math.floor(d / 1000) + 's ago';
    if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
    if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
    return Math.floor(d / 86400000) + 'd ago';
  }

  function fmtAgoMs(ms) {
    if (ms == null) return '--';
    if (ms < 5000) return 'just now';
    if (ms < 60000) return Math.floor(ms / 1000) + 's ago';
    if (ms < 3600000) return Math.floor(ms / 60000) + 'm ago';
    if (ms < 86400000) return Math.floor(ms / 3600000) + 'h ago';
    return Math.floor(ms / 86400000) + 'd ago';
  }

  function fmtTokens(n) {
    if (n == null || n === 0) return '0';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return Math.round(n / 1000) + 'k';
    return String(n);
  }

  function fmtCost(usd) {
    if (usd == null || usd === 0) return '$0';
    return '$' + usd.toFixed(2);
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderMd(text) {
    if (typeof marked !== 'undefined' && marked.parse) {
      try { return marked.parse(text); } catch(e) { /* fallback */ }
    }
    return '<pre>' + esc(text) + '</pre>';
  }

  // ── State ──
  var data = null;
  var lastRecvAt = 0;
  var wsConnected = false;
  var ws = null;

  // View state
  var viewMode = 'dashboard'; // 'dashboard' | 'session' | 'task'
  var selectedSessionId = null;
  var selectedTaskId = null;
  var sessionMessages = null; // cached messages for selected session
  var sessions = []; // cached session list
  var taskDetail = null; // cached task detail
  var taskOutput = null; // cached task output
  var taskLogs = [];
  var taskLogTotalLines = 0;
  var taskLogPollTimer = null;

  var $ = function (id) { return document.getElementById(id); };

  // ── Chat management ──

  /** Send message from the chat input bar */
  window.doChatSend = function() {
    var input = $('chat-input');
    var text = (input.value || '').trim();
    if (!text) return;
    input.value = '';

    fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text }),
    }).then(function(r) { return r.json(); }).then(function(body) {
      if (body.ok) {
        showToast('Sent', true);
        // Refresh messages after a brief delay
        setTimeout(function() {
          if (viewMode === 'session') {
            if (selectedSessionId) loadSessionMessages(selectedSessionId);
            else loadAllMessages();
          }
        }, 500);
      } else {
        showToast('Error: ' + (body.message || 'send failed'), false);
      }
    }).catch(function(err) {
      showToast('Error: ' + err.message, false);
    });

    input.focus();
  };

  function showChat() {
    $('main').classList.add('chat-active');
  }

  function hideChat() {
    $('main').classList.remove('chat-active');
    $('chat-input-bar').classList.remove('visible');
  }

  // ── Normalize ──
  function normalize(raw) {
    if (raw.system) return raw;
    var dir = raw.director || {};
    var q = raw.queue || [];
    var limit = dir.flushContextLimit || 0;
    var tokens = dir.lastInputTokens || 0;
    var pct = limit > 0 ? (tokens / limit) * 100 : 0;
    var state = 'idle';
    if (dir.flushing) state = 'flushing';
    else if ((dir.pendingCount || 0) > 0) state = 'processing';
    return {
      system: { status: dir.alive ? 'healthy' : 'error', uptime: 0, messaging: 'unknown', directorAlive: !!dir.alive },
      activity: { state: state },
      context: { tokens: tokens, limit: limit, percent: Math.round(pct), lastFlushAgoMs: null },
      metrics: { today: { messagesProcessed: 0, avgResponseSec: 0, totalCostUsd: 0 }, recentMessages: [], recentErrors: [] },
      queue: q.map(function(i) { return { correlationId: i.correlationId || '', preview: (i.text || '').slice(0,60), timestamp: i.timestamp, cancelled: !!i.cancelled }; }),
      tasks: { summary: { running: 0, completed: 0, failed: 0 }, recent: [] },
    };
  }

  // ── WebSocket ──
  function connect() {
    ws = new WebSocket('ws://' + location.host);
    ws.onopen = function () {
      wsConnected = true;
      $('overlay').classList.add('hidden');
      // Load sessions on connect
      loadSessions();
    };
    ws.onclose = function () {
      wsConnected = false;
      $('overlay').classList.remove('hidden');
      setTimeout(connect, 2000);
    };
    ws.onerror = function () {};
    ws.onmessage = function (ev) {
      try {
        var msg = JSON.parse(ev.data);
        if (msg.type === 'status') {
          data = normalize(msg.data);
          lastRecvAt = Date.now();
          renderSidebar();
          if (viewMode === 'dashboard') renderDashboard();
        } else if (msg.type === 'command_result') {
          showToast(msg.message || msg.command, msg.ok);
        }
      } catch (e) { /* ignore */ }
    };
  }

  // ── Data loading ──
  function loadSessions() {
    fetch('/api/sessions').then(function(r) { return r.json(); }).then(function(d) {
      sessions = d || [];
      renderSessionList();
    }).catch(function() {});
  }

  function loadSessionMessages(sessionId) {
    var url = '/api/messages?limit=200';
    if (sessionId) url += '&sessionId=' + encodeURIComponent(sessionId);
    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
      sessionMessages = d || [];
      renderSessionView();
    }).catch(function() {
      sessionMessages = [];
      renderSessionView();
    });
  }

  function loadAllMessages() {
    fetch('/api/messages?limit=200').then(function(r) { return r.json(); }).then(function(d) {
      sessionMessages = d || [];
      renderSessionView();
    }).catch(function() {
      sessionMessages = [];
      renderSessionView();
    });
  }

  function loadTaskDetail(taskId) {
    fetch('/api/tasks/' + taskId).then(function(r) { return r.json(); }).then(function(d) {
      taskDetail = d;
      taskOutput = null;
      renderTaskView();
      if (d.result_file) {
        fetch('/api/tasks/' + taskId + '/output').then(function(r) {
          if (r.ok) return r.json();
          return null;
        }).then(function(o) {
          if (o && o.content) {
            taskOutput = o.content;
            renderTaskResultPanel();
          }
        }).catch(function() {});
      }
    }).catch(function() {});
  }

  // ── Commands ──
  window.doCmd = function (cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    var msgs = {
      flush: 'Flush Director context? Progress will be checkpointed.',
      esc: 'Cancel the oldest queued message?',
      restart: 'Restart Director? In-flight processing will be interrupted.',
    };
    if (msgs[cmd] && !confirm(msgs[cmd])) return;
    ws.send(JSON.stringify({ type: 'command', command: cmd }));
  };

  window.doSend = async function () {
    var input = $('send-input');
    var text = (input.value || '').trim();
    if (!text) return;
    input.value = '';
    try {
      var res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text }),
      });
      var body = await res.json();
      showToast(body.message || 'Sent', !!body.ok);
    } catch (err) {
      showToast('Send failed: ' + err.message, false);
    }
  };

  // ── View switching ──
  window.selectSession = function (sessionId) {
    stopLogPolling();
    viewMode = 'session';
    selectedSessionId = sessionId;
    selectedTaskId = null;
    $('detail-content').classList.remove('task-split-mode');
    renderSessionList();
    renderTaskList();
    $('dh-title').textContent = 'Session';
    var sessionLabel = 'All Messages';
    if (sessionId) {
      var match = sessions.find(function(s) { return s.sessionId === sessionId; });
      sessionLabel = (match && match.sessionName) || sessionId.slice(0, 12) + '...';
    }
    $('dh-sub').textContent = sessionLabel;
    showChat();
    if (sessionId) {
      loadSessionMessages(sessionId);
    } else {
      loadAllMessages();
    }
  };

  window.selectTask = function (taskId) {
    stopLogPolling();
    viewMode = 'task';
    selectedTaskId = taskId;
    selectedSessionId = null;
    taskDetail = null;
    taskOutput = null;
    taskLogs = [];
    taskLogTotalLines = 0;
    hideChat();
    renderSessionList();
    renderTaskList();
    $('dh-title').innerHTML = '<span style="cursor:pointer;color:var(--blue);margin-right:8px" onclick="selectDashboard()">\u2190</span>Task';
    $('dh-sub').textContent = taskId;
    loadTaskDetail(taskId);
  };

  window.selectDashboard = function () {
    stopLogPolling();
    viewMode = 'dashboard';
    selectedSessionId = null;
    selectedTaskId = null;
    $('detail-content').classList.remove('task-split-mode');
    hideChat();
    renderSessionList();
    renderTaskList();
    $('dh-title').textContent = 'Dashboard';
    $('dh-sub').textContent = '';
    renderDashboard();
  };

  // ── Toast ──
  var toastTimer = null;
  function showToast(message, ok) {
    var el = $('toast');
    el.textContent = message;
    el.className = (ok ? 'ok' : 'err') + ' show';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 3000);
  }

  // ── Render: Sidebar ──
  function renderSidebar() {
    if (!data) return;
    var sys = data.system || {};
    var act = data.activity || {};
    var ctx = data.context || {};
    var met = data.metrics || {};
    var today = met.today || {};
    var queue = data.queue || [];
    var tasks = data.tasks || {};

    // Header bar
    var dot = $('hb-dot');
    var st = $('hb-status');
    dot.className = 'dot';
    if (sys.status === 'healthy') { dot.classList.add('green'); st.textContent = 'Healthy'; st.style.color = 'var(--green)'; }
    else if (sys.status === 'degraded') { dot.classList.add('yellow'); st.textContent = 'Degraded'; st.style.color = 'var(--yellow)'; }
    else { dot.classList.add('red'); st.textContent = 'Error'; st.style.color = 'var(--red)'; }

    var fEl = $('hb-messaging');
    fEl.textContent = sys.messaging === 'connected' ? 'Connected' : (sys.messaging || '--');
    fEl.style.color = sys.messaging === 'connected' ? 'var(--green)' : 'var(--overlay1)';

    var dEl = $('hb-director');
    dEl.textContent = sys.directorAlive ? 'Alive' : 'Dead';
    dEl.style.color = sys.directorAlive ? 'var(--green)' : 'var(--red)';

    $('hb-uptime').textContent = fmtDur(sys.uptime);

    var qw = $('hb-queue-wrap');
    if (queue.length > 0) { qw.style.display = ''; $('hb-queue').textContent = queue.length + ' queued'; }
    else { qw.style.display = 'none'; }

    // Activity
    var adot = $('act-dot');
    adot.className = 'act-dot ' + (act.state || 'idle');
    var labels = { idle: 'Idle', processing: 'Processing', flushing: 'Flushing', restarting: 'Restarting' };
    var colors = { idle: 'var(--subtext0)', processing: 'var(--green)', flushing: 'var(--yellow)', restarting: 'var(--peach)' };
    var al = $('act-label');
    al.textContent = labels[act.state] || act.state || 'Idle';
    al.style.color = colors[act.state] || 'var(--subtext0)';

    var prev = $('act-preview');
    var elap = $('act-elapsed');
    if (act.currentMessage && act.state === 'processing') {
      prev.textContent = '"' + (act.currentMessage.preview || '') + '"';
      var elapsed = (act.currentMessage.elapsedMs || 0) + (Date.now() - lastRecvAt);
      elap.textContent = fmtDur(elapsed);
    } else {
      prev.textContent = '';
      elap.textContent = '';
    }

    // Context
    var pct = ctx.percent || 0;
    var bc = pct > 95 ? 'var(--red)' : pct > 80 ? 'var(--yellow)' : 'var(--green)';
    var bar = $('ctx-bar');
    bar.style.width = Math.min(pct, 100) + '%';
    bar.style.background = bc;
    $('ctx-tokens').textContent = fmtTokens(ctx.tokens) + ' / ' + fmtTokens(ctx.limit);
    var pe = $('ctx-pct');
    pe.textContent = pct + '%';
    pe.style.color = bc;
    $('ctx-flush').textContent = 'Last flush: ' + (ctx.lastFlushAgoMs != null ? fmtAgoMs(ctx.lastFlushAgoMs) : '--');

    // Today stats
    $('st-msgs').textContent = (today.messagesProcessed || 0).toLocaleString();
    $('st-avg').textContent = (today.avgResponseSec != null ? today.avgResponseSec.toFixed(1) + 's' : '0s');
    $('st-cost').textContent = fmtCost(today.totalCostUsd);

    // Task list (from status push)
    renderTaskList();
  }

  function renderSessionList() {
    var el = $('session-list');
    if (sessions.length === 0) {
      el.innerHTML = '<div class="list-item" onclick="selectSession(null)" ' +
        (viewMode === 'session' && !selectedSessionId ? 'class="list-item active"' : '') +
        '><span class="item-icon" style="color:var(--blue)">&#9776;</span>' +
        '<span class="item-label">All Messages</span></div>';
      return;
    }
    var html = '<div class="list-item' + (viewMode === 'session' && !selectedSessionId ? ' active' : '') +
      '" onclick="selectSession(null)"><span class="item-icon" style="color:var(--blue)">&#9776;</span>' +
      '<span class="item-label">All Messages</span></div>';
    // Sort: live session pinned to top, then by lastMessageAt descending
    var liveId = data && data.system && data.system.sessionId;
    var sorted = sessions.slice().sort(function(a, b) {
      if (a.sessionId === liveId && b.sessionId !== liveId) return -1;
      if (b.sessionId === liveId && a.sessionId !== liveId) return 1;
      return (b.lastMessageAt || '').localeCompare(a.lastMessageAt || '');
    });
    for (var i = 0; i < sorted.length; i++) {
      var s = sorted[i];
      var isActive = viewMode === 'session' && selectedSessionId === s.sessionId;
      var isLive = data && data.system && data.system.sessionId === s.sessionId;
      var dotColor = isLive ? 'var(--green)' : 'var(--overlay0)';
      html += '<div class="list-item' + (isActive ? ' active' : '') +
        '" onclick="selectSession(\'' + esc(s.sessionId) + '\')">' +
        '<span class="item-icon" style="color:' + dotColor + '">&#9679;</span>' +
        '<span class="item-label">' + esc(s.sessionName || s.sessionId.slice(0, 16)) + (isLive ? ' <span class="badge running" style="font-size:8px;padding:0 4px;margin-left:2px">live</span>' : '') + '</span>' +
        '<span class="item-meta">' + s.messageCount + '</span></div>';
    }
    el.innerHTML = html;
  }

  function renderTaskList() {
    if (!data) return;
    var tasks = data.tasks || {};
    var tSum = tasks.summary || {};
    var tList = tasks.recent || [];
    var el = $('task-list');
    var counts = $('task-counts');

    var parts = [];
    if (tSum.running) parts.push(tSum.running + ' running');
    if (tSum.completed) parts.push(tSum.completed + ' done');
    if (tSum.failed) parts.push(tSum.failed + ' failed');
    counts.textContent = parts.length ? '(' + parts.join(', ') + ')' : '';

    if (tList.length === 0) {
      el.innerHTML = '<div class="empty">No tasks</div>';
      return;
    }
    var html = '';
    for (var j = 0; j < tList.length; j++) {
      var t = tList[j];
      var st = t.status || 'pending';
      var isActive = viewMode === 'task' && selectedTaskId === t.id;
      html += '<div class="list-item' + (isActive ? ' active' : '') +
        '" onclick="selectTask(\'' + esc(t.id) + '\')">';
      if (st === 'running' || st === 'dispatched') html += '<div class="running-dot"></div>';
      html += '<span class="badge ' + esc(st) + '">' + esc(st) + '</span>' +
        '<span class="item-label">' + esc(t.description || t.role) + '</span>';
      if (t.durationMs != null) html += '<span class="item-meta">' + fmtDur(t.durationMs) + '</span>';
      html += '</div>';
    }
    el.innerHTML = html;
  }

  // ── Render: Dashboard (default view) ──
  function renderDashboard() {
    if (!data) return;
    var met = data.metrics || {};
    var today = met.today || {};
    var msgs = met.recentMessages || [];
    var errs = met.recentErrors || [];
    var queue = data.queue || [];

    var html = '';

    // Stats cards
    html += '<div class="dash-grid">';
    html += '<div class="dash-card"><div class="dash-card-title">Messages Processed</div><div class="stat-big">' +
      (today.messagesProcessed || 0) + '</div><div class="stat-sub">today</div></div>';
    html += '<div class="dash-card"><div class="dash-card-title">Avg Response</div><div class="stat-big">' +
      (today.avgResponseSec != null ? today.avgResponseSec.toFixed(1) + 's' : '0s') + '</div><div class="stat-sub">today</div></div>';
    html += '<div class="dash-card"><div class="dash-card-title">Cost</div><div class="stat-big">' +
      fmtCost(today.totalCostUsd) + '</div><div class="stat-sub">today</div></div>';
    html += '</div>';

    // Queue
    if (queue.length > 0) {
      html += '<div style="margin-bottom:16px"><div class="dash-card-title">Queue (' + queue.length + ')</div>';
      for (var q = 0; q < queue.length; q++) {
        var qi = queue[q];
        html += '<div class="queue-item' + (qi.cancelled ? ' cancelled' : '') + '">' +
          '<span class="queue-text">' + esc(qi.preview) + '</span>' +
          '<span class="queue-time">' + fmtAgo(qi.timestamp) + '</span></div>';
      }
      html += '</div>';
    }

    // Recent messages
    html += '<div style="margin-bottom:16px"><div class="dash-card-title">Recent Messages</div>';
    if (msgs.length === 0) {
      html += '<div class="empty">No messages yet</div>';
    } else {
      for (var i = 0; i < msgs.length; i++) {
        var m = msgs[i];
        var isIn = m.direction === 'in';
        var arrow = isIn ? '&#8592;' : '&#8594;';
        var meta = '';
        if (isIn && m.responseSec != null) meta = m.responseSec.toFixed(1) + 's';
        else if (m.timestamp) meta = fmtAgo(m.timestamp);
        html += '<div class="dmsg-row' + (isIn ? ' in' : '') + '">' +
          '<span class="dmsg-dir ' + (isIn ? 'in' : 'out') + '">' + arrow + '</span>' +
          '<span class="dmsg-text">' + esc(m.preview) + '</span>' +
          '<span class="dmsg-meta">' + esc(meta) + '</span></div>';
      }
    }
    html += '</div>';

    // Errors
    if (errs.length > 0) {
      html += '<div class="err-section"><div class="dash-card-title" style="color:var(--red)">Errors</div>';
      for (var k = 0; k < errs.length; k++) {
        var e = errs[k];
        html += '<div class="err-row"><span class="err-icon">&#9888;</span>' +
          '<span class="err-text">' + esc(e.message) + '</span>' +
          '<span class="err-time">' + fmtAgo(e.timestamp) + '</span></div>';
      }
      html += '</div>';
    }

    $('detail-content').innerHTML = html;
  }

  // ── Render: Session (chat) View ──
  function renderSessionView() {
    var el = $('chat-messages');
    if (!el) return;

    if (!sessionMessages || sessionMessages.length === 0) {
      el.innerHTML = '<div class="empty" style="padding:40px">No messages found</div>';
      $('chat-input-bar').classList.remove('visible');
      return;
    }

    // Messages come most-recent-first from API, reverse for chronological display
    var msgs = sessionMessages.slice().reverse();
    var html = '';

    for (var i = 0; i < msgs.length; i++) {
      var m = msgs[i];
      var isIn = m.direction === 'in';
      html += '<div class="chat-msg ' + (isIn ? 'in' : 'out') + '">';
      html += '<div class="chat-msg-header">';
      html += '<span class="chat-msg-role ' + (isIn ? 'user' : 'bot') + '">' + (isIn ? 'User' : 'Director') + '</span>';
      html += '</div>';
      html += '<div class="chat-msg-body">';
      if (isIn) {
        html += esc(m.content);
      } else {
        html += '<div class="md-content">' + renderMd(m.content) + '</div>';
      }
      html += '</div></div>';
    }

    // Show processing indicator if live session is busy
    var isLiveSession = data && data.system &&
      (selectedSessionId === data.system.sessionId || !selectedSessionId);
    if (isLiveSession && data && data.activity && data.activity.state === 'processing') {
      html += '<div class="chat-processing"><div class="running-dot"></div><span>Processing...</span></div>';
    }

    el.innerHTML = html;

    // Scroll to bottom
    var scroll = $('chat-scroll');
    if (scroll) scroll.scrollTop = scroll.scrollHeight;

    // Show/hide input bar based on live session
    var inputBar = $('chat-input-bar');
    if (isLiveSession) {
      inputBar.classList.add('visible');
      setTimeout(function() { $('chat-input').focus(); }, 0);
    } else {
      inputBar.classList.remove('visible');
    }
  }

  // ── Render: Task Detail View (Split: Logs + Result) ──
  function renderTaskView() {
    var container = $('detail-content');
    container.classList.add('task-split-mode');

    if (!taskDetail) {
      container.innerHTML = '<div class="empty" style="padding:40px">Loading task...</div>';
      return;
    }

    var t = taskDetail;
    var html = '<div class="task-detail-split">';

    // Left panel — logs
    html += '<div class="td-log-panel">';
    html += '<div class="td-panel-header">';
    html += '<div class="td-section-title" style="margin:0">Logs</div>';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    if (t.status === 'running' || t.status === 'dispatched') {
      html += '<div class="running-dot"></div><span style="font-size:11px;color:var(--green)">Live</span>';
    }
    html += '<span style="font-size:11px;color:var(--overlay0);font-family:var(--font-mono)">' + esc(t.role) + '</span>';
    html += '</div></div>';
    html += '<div class="td-log-scroll" id="td-log-scroll"><div id="td-log-entries"></div></div>';
    html += '</div>';

    // Right panel — result + meta
    html += '<div class="td-result-panel">';
    html += '<div class="td-panel-header">';
    html += '<div class="td-section-title" style="margin:0">Result</div>';
    html += '<span class="badge ' + esc(t.status) + '">' + esc(t.status) + '</span>';
    html += '</div>';
    html += '<div class="td-result-scroll" id="td-result-content"></div>';
    html += '</div>';

    html += '</div>';
    container.innerHTML = html;

    renderTaskResultPanel();

    taskLogs = [];
    taskLogTotalLines = 0;
    loadTaskLogs(t.id, 0);

    if (t.status === 'running' || t.status === 'dispatched') {
      startLogPolling(t.id);
    }
  }

  function renderTaskResultPanel() {
    var el = $('td-result-content');
    if (!el || !taskDetail) return;

    var t = taskDetail;
    var html = '';

    html += '<div class="td-meta" style="margin-bottom:12px">';
    html += '<div class="td-field"><div class="td-field-label">Task ID</div><div class="td-field-value">' + esc(t.id) + '</div></div>';
    html += '<div class="td-field"><div class="td-field-label">Created</div><div class="td-field-value">' + esc(t.created_at || '--') + '</div></div>';
    if (t.duration_ms != null) {
      html += '<div class="td-field"><div class="td-field-label">Duration</div><div class="td-field-value">' + fmtDur(t.duration_ms) + '</div></div>';
    }
    if (t.cost_usd != null) {
      html += '<div class="td-field"><div class="td-field-label">Cost</div><div class="td-field-value">' + fmtCost(t.cost_usd) + '</div></div>';
    }
    html += '</div>';

    if (t.description) {
      html += '<div style="font-size:13px;color:var(--subtext1);margin-bottom:12px">' + esc(t.description) + '</div>';
    }

    if (t.status === 'running' || t.status === 'dispatched') {
      html += '<div class="td-result-running"><div class="spinner"></div><span>Running...</span></div>';
    }

    if (t.error) {
      html += '<div class="td-error" style="margin-bottom:12px">' + esc(t.error) + '</div>';
    }

    if (taskOutput) {
      html += '<div class="td-output"><div class="md-content">' + renderMd(taskOutput) + '</div></div>';
    } else if (t.result_file && t.status === 'completed') {
      html += '<div class="empty">Loading output...</div>';
    }

    el.innerHTML = html;
  }

  function loadTaskLogs(taskId, after) {
    var url = '/api/tasks/' + taskId + '/logs';
    if (after > 0) url += '?after=' + after;
    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
      if (!d) return;
      if (d.entries && d.entries.length > 0) {
        taskLogs = taskLogs.concat(d.entries);
        taskLogTotalLines = d.totalLines;
        renderLogEntries(d.entries, after > 0);
      } else if (d.totalLines != null) {
        taskLogTotalLines = d.totalLines;
      }
    }).catch(function() {});
  }

  function renderLogEntries(entries, append) {
    var el = $('td-log-entries');
    if (!el) return;

    if (!append) el.innerHTML = '';

    var frag = document.createDocumentFragment();
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var div = document.createElement('div');
      div.className = 'log-entry';

      switch (e.type) {
        case 'system':
          div.className += ' log-system';
          div.textContent = '\u25cf ' + e.content;
          break;
        case 'text':
          div.className += ' log-text';
          div.innerHTML = renderMd(e.content);
          break;
        case 'thinking':
          div.className += ' log-thinking';
          div.innerHTML = '<span class="think-label">\u25b8 Thinking</span>' +
            '<div class="think-content">' + esc(e.content) + '</div>';
          div.onclick = function() {
            this.classList.toggle('expanded');
            var lbl = this.querySelector('.think-label');
            lbl.textContent = this.classList.contains('expanded') ? '\u25be Thinking' : '\u25b8 Thinking';
          };
          break;
        case 'tool_use':
          div.className += ' log-tool';
          var detail = e.meta && e.meta.input ? JSON.stringify(e.meta.input, null, 2) : '';
          div.innerHTML = '<div class="tool-header">\u25b6 ' + esc(e.content) + '</div>' +
            (detail ? '<div class="tool-detail">' + esc(detail) + '</div>' : '');
          div.onclick = function() { this.classList.toggle('expanded'); };
          break;
        case 'tool_result':
          div.className += ' log-tool-result' + (e.meta && e.meta.is_error ? ' error' : '');
          div.textContent = (e.meta && e.meta.is_error ? '\u2717 ' : '\u2713 ') + e.content;
          div.onclick = function() { this.classList.toggle('expanded'); };
          break;
        case 'result':
          div.className += ' log-result';
          var parts = [e.content];
          if (e.meta) {
            if (e.meta.duration_ms) parts.push(fmtDur(e.meta.duration_ms));
            if (e.meta.cost_usd) parts.push(fmtCost(e.meta.cost_usd));
            if (e.meta.num_turns) parts.push(e.meta.num_turns + ' turns');
          }
          div.textContent = parts.join(' \u00b7 ');
          break;
      }

      frag.appendChild(div);
    }
    el.appendChild(frag);

    // Auto-scroll to bottom if near bottom
    var scroll = $('td-log-scroll');
    if (scroll) {
      var nearBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 100;
      if (nearBottom || !append) {
        scroll.scrollTop = scroll.scrollHeight;
      }
    }
  }

  function startLogPolling(taskId) {
    stopLogPolling();
    taskLogPollTimer = setInterval(function() {
      if (viewMode !== 'task' || selectedTaskId !== taskId) {
        stopLogPolling();
        return;
      }
      loadTaskLogs(taskId, taskLogTotalLines);
      fetch('/api/tasks/' + taskId).then(function(r) { return r.json(); }).then(function(d) {
        if (!d || !taskDetail) return;
        var statusChanged = d.status !== taskDetail.status;
        taskDetail = d;
        if (statusChanged) {
          renderTaskResultPanel();
          if (d.status === 'completed' || d.status === 'failed') {
            stopLogPolling();
            if (d.result_file) {
              fetch('/api/tasks/' + taskId + '/output').then(function(r) {
                if (r.ok) return r.json();
                return null;
              }).then(function(o) {
                if (o && o.content) {
                  taskOutput = o.content;
                  renderTaskResultPanel();
                }
              }).catch(function() {});
            }
          }
        }
      }).catch(function() {});
    }, 2000);
  }

  function stopLogPolling() {
    if (taskLogPollTimer) {
      clearInterval(taskLogPollTimer);
      taskLogPollTimer = null;
    }
  }

  // ── Elapsed timer ──
  setInterval(function () {
    if (!data || !data.activity) return;
    var act = data.activity;
    if (act.state === 'processing' && act.currentMessage) {
      var elapsed = (act.currentMessage.elapsedMs || 0) + (Date.now() - lastRecvAt);
      var el = $('act-elapsed');
      if (el) el.textContent = fmtDur(elapsed);
    }
  }, 1000);

  // Refresh sessions periodically (every 30s)
  setInterval(function () {
    if (wsConnected) loadSessions();
  }, 30000);

  // ── Boot ──
  connect();
  // Show dashboard on load
  selectDashboard();

})();
</script>
</body>
</html>
