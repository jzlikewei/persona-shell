<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persona Console</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="toast"></div>

<div id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text">Connecting...</div>
</div>

<div id="app">

  <!-- Header -->
  <header id="header">
    <span class="logo">Persona Shell</span>
    <div class="hi">
      <div class="dot off" id="hb-dot"></div>
      <span class="hi-value" id="hb-status">--</span>
    </div>
    <div class="hi">
      <span class="hi-label">Messaging</span>
      <span class="hi-value" id="hb-messaging">--</span>
    </div>
    <div class="hi">
      <span class="hi-label">Director</span>
      <span class="hi-value" id="hb-director">--</span>
    </div>
    <div class="hi" id="hb-queue-wrap" style="display:none">
      <span class="queue-badge" id="hb-queue"></span>
    </div>
    <div class="hspacer"></div>
    <div class="hi state-trigger-wrap" id="state-wrap">
      <button class="state-trigger" id="state-trigger" onclick="toggleStatePanel()">
        <span class="state-icon">📋</span>
      </button>
      <div class="state-panel" id="state-panel">
        <div class="state-panel-header">
          <div class="state-tabs">
            <button class="state-tab active" id="state-tab-state" onclick="switchStateTab('state')">State</button>
            <button class="state-tab" id="state-tab-todo" onclick="switchStateTab('todo')">TODO</button>
          </div>
          <button class="state-refresh-btn" onclick="loadStateData()">↻</button>
        </div>
        <div class="state-panel-body" id="state-panel-body">
          <div class="empty">Loading...</div>
        </div>
      </div>
    </div>
    <div class="hi cron-trigger-wrap" id="cron-wrap">
      <button class="cron-trigger" id="cron-trigger" onclick="toggleCronPanel()">
        <span class="cron-icon">⏱</span>
        <span class="cron-badge" id="cron-badge" style="display:none"></span>
      </button>
      <div class="cron-panel" id="cron-panel">
        <div class="cron-panel-header">
          <span class="cron-panel-title">Cron Jobs</span>
          <span class="cron-panel-count" id="cron-panel-count"></span>
        </div>
        <div class="cron-panel-body" id="cron-panel-body">
          <div class="empty">No cron jobs</div>
        </div>
      </div>
    </div>
    <div class="hi">
      <span class="hi-label">Uptime</span>
      <span class="hi-value" id="hb-uptime">--</span>
    </div>
  </header>

  <div id="body">
    <!-- Sidebar -->
    <aside id="sidebar">

      <!-- Status -->
      <div class="sb-section">
        <div class="sb-title">Activity</div>
        <div class="act-row">
          <div class="act-dot idle" id="act-dot"></div>
          <span class="act-text" id="act-label">Idle</span>
        </div>
        <div class="act-preview-text" id="act-preview"></div>
        <div class="act-elapsed-text" id="act-elapsed"></div>
      </div>

      <div class="sb-section">
        <div class="sb-title">Context Window</div>
        <div class="ctx-bar-wrap">
          <div class="ctx-bar-fill" id="ctx-bar" style="width:0;background:var(--green)"></div>
        </div>
        <div class="ctx-info">
          <span id="ctx-tokens">-- / --</span>
          <span class="ctx-pct" id="ctx-pct" style="color:var(--green)">0%</span>
        </div>
        <div style="font-size:11px;color:var(--overlay0);margin-top:4px;font-family:var(--font-mono)" id="ctx-flush">Last flush: --</div>
      </div>

      <!-- Sessions (main + groups unified) -->
      <div class="sb-section" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
        <div class="sb-title" style="display:flex;align-items:center">Sessions <span id="session-count" style="font-size:9px;color:var(--overlay1);text-transform:none;letter-spacing:0;font-weight:400"></span><span style="margin-left:auto;cursor:pointer;color:var(--blue);font-size:14px;font-weight:700;line-height:1" onclick="doNewWebChat()" title="New Chat">＋</span></div>
        <div class="sb-scroll" id="session-list">
          <div class="empty">No sessions</div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="sb-section" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
        <div class="sb-title">Tasks <span id="task-counts" style="font-size:9px;color:var(--overlay1);text-transform:none;letter-spacing:0;font-weight:400"></span></div>
        <div class="sb-scroll" id="task-list">
          <div class="empty">No tasks</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="sb-section">
        <div class="sb-title">Actions</div>
        <div class="action-btns">
          <button class="btn btn-flush" onclick="doCmd('flush')">Flush</button>
          <button class="btn btn-flush" onclick="doCmd('clear')">Clear</button>
          <button class="btn btn-esc" onclick="doCmd('esc')">Esc</button>
          <button class="btn btn-restart" onclick="doCmd('session-restart')">Restart</button>
        </div>
        <div class="send-row">
          <input type="text" id="send-input" placeholder="Send to Director..." onkeydown="if(event.key==='Enter'&&!event.isComposing)doSend()" />
          <button class="btn-send" onclick="doSend()">&#10132;</button>
        </div>
      </div>

    </aside>

    <div class="resize-handle sidebar-resize" id="sidebar-resize"></div>

    <!-- Main content area -->
    <div id="main">
      <div id="detail-header">
        <span class="dh-title" id="dh-title">Dashboard</span>
        <div class="sd" id="session-dropdown" style="display:none">
          <button class="sd-trigger" id="sd-trigger" onclick="toggleSessionDropdown()">
            <span class="sd-dot" id="sd-dot"></span>
            <span class="sd-label" id="sd-label"></span>
            <span class="sd-arrow">&#9662;</span>
          </button>
          <div class="sd-menu" id="sd-menu"></div>
        </div>
        <span class="dh-sub" id="dh-sub"></span>
      </div>
      <div id="detail-content">
        <!-- filled by JS -->
      </div>
      <div id="chat-container">
        <div id="chat-scroll"><div id="chat-messages"></div></div>
        <div id="chat-input-bar">
          <textarea rows="1" id="chat-input" placeholder="Send message to Director..." onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.isComposing){event.preventDefault();doChatSend()}"></textarea>
          <button onclick="doChatSend()">Send</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
